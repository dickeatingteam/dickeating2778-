<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dickeating 检测 (极简版)</title>
    <style>
        /* 赛博基础配色 - 绝无加载字样 */
        body { background-color: #1e1e1e; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #2d2d2d; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 2px solid #ff9800; }
        h1 { color: #ff9800; font-size: 22px; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .step { margin: 20px 0; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .question { font-size: 18px; margin-bottom: 20px; font-weight: bold; }
        .options { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { background: #555; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 15px; margin: 5px; }
        .btn:hover { background: #777; }
        .result-box { display: none; margin-top: 20px; padding: 20px; background: #111; border-radius: 10px; border: 1px solid #00e5ff; }
        .result-text { font-size: 28px; font-weight: bold; color: #00e5ff; margin: 10px 0; }
        .btn-group { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; align-items: center;}
        .reset-btn { background: #ff9800; color: #000; border: none; padding: 12px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 80%; max-width: 200px;}
        .download-btn { background: #00e5ff; color: #000; border: none; padding: 12px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 80%; max-width: 200px;}
    </style>
</head>
<body>
<div class="container">
    <h1>dickeating 性别测算</h1>
    <div class="step" id="questionArea">
        <div class="question" id="questionText">请选择以下选项继续</div>
        <div class="options" id="optionsContainer"></div>
    </div>
    <div class="result-box" id="resultArea">
        <div>根据 dickeating 的最新算法，您是：</div>
        <div class="result-text" id="finalResult">诊断中</div>
        <div class="btn-group">
            <button class="download-btn" onclick="downloadResult()">打印确诊单</button>
            <button class="reset-btn" onclick="location.reload()">重新投胎</button>
        </div>
    </div>
</div>

<script>
    // 题库 (保证选项一定会出来)
    var quizData = [
        { q: "你早上一般吃什么？", o: ["常温种猪精液", "牛奶（sperm）", "dick", "逼"] },
        { q: "你周末最喜欢干什么？", o: ["睡大觉", "打游戏", "起飞", "挖矿"] },
        { q: "你晚上睡前通常干嘛？", o: ["刷手机", "看书", "食用霰弹", "做深蹲"] },
        { q: "你暑假最想去哪？", o: ["叙利亚", "伊拉克", "乌克兰", "十七班"] },
        { q: "你最喜欢的饮料？", o: ["常温种猪精液", "尿", "核废水", "豆汁儿"] },
        { q: "你现在最想对 dickeating 说什么？", o: ["操你妈", "滚", "你是个神", "放我出去"] }
    ];

    var results = ["双性恋", "无性恋", "沃尔玛购物袋", "Gay", "Lesbian", "MtF", "FtM"];
    var currentIndex = 0;
    var finalDiagnosis = "";

    function loadQuestion() {
        if (currentIndex >= quizData.length) {
            showResult();
            return;
        }
        var data = quizData[currentIndex];
        document.getElementById('questionText').innerText = data.q;
        var html = '';
        for (var i = 0; i < data.o.length; i++) {
            // 固定字符串拼接 onclick
            html += `<button class="btn" onclick="nextStep('${data.o[i]}')">${data.o[i]}</button>`;
        }
        document.getElementById('optionsContainer').innerHTML = html;
    }

    function nextStep(choice) {
        currentIndex++;
        loadQuestion();
    }

    function showResult() {
        document.getElementById('questionArea').style.display = 'none';
        var r = Math.floor(Math.random() * results.length);
        finalDiagnosis = results[r];
        document.getElementById('finalResult').innerText = finalDiagnosis;
        document.getElementById('resultArea').style.display = 'block';
    }

    function downloadResult() {
        var date = new Date().toLocaleString();
        // 原版报告一字不改
        var content = `
========================================
       dickeating ofucks 病历报告
========================================
       检测时间：${date}
       检测版本：dickeating ofucks 2.0
----------------------------------------
       最终诊断结果：${finalDiagnosis}
----------------------------------------
       医生建议：建议立刻前往“很正经的一群人”群聊
                进行二期确诊，并在门口排队
                领取“沃尔玛购物袋”实体化资格。
========================================
       备注：本诊断不具任何法律效力，仅供发疯使用。
       造物主：deepfuck (门高旭，王赫然，李谨然，周子轩）
       ；
    
        var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `dickeating_病历单_${finalDiagnosis}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 直接启动
    loadQuestion();
</script>
</body>
</html>
