<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dickeating 检测 (硬核物理版)</title>
    <style>
        body { background-color: #1e1e1e; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #2d2d2d; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 2px solid #ff9800; }
        h1 { color: #ff9800; font-size: 22px; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        .step { margin: 20px 0; min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .question { font-size: 18px; margin-bottom: 15px; font-weight: bold; }
        
        .options { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { background: #555; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn:hover { background: #777; }

        .result-box { display: none; margin-top: 20px; padding: 20px; background: #111; border-radius: 10px; border: 1px solid #00e5ff; }
        .result-text { font-size: 28px; font-weight: bold; color: #00e5ff; margin: 10px 0; }
        
        .btn-group { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .reset-btn { background: #ff9800; color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 80%; max-width: 200px; }
        .download-btn { background: #00e5ff; color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 80%; max-width: 200px; }
        
        .progress { font-size: 13px; color: #888; margin-bottom: 10px; }
        
        /* 隐藏所有题目，只显示当前 */
        .q-block { display: none; }
        .q-block.active { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <h1>dickeating 性别测算</h1>
    <div class="progress" id="progressDisplay">第 1 / 6 题</div>
    
    <div class="step" id="questionArea">
        <div class="question" id="questionText">请选择以下选项继续</div>
        <div class="options" id="optionsContainer">
            
            <!-- 第一题 -->
            <div id="q1" class="q-block active">
                <div style="font-size:18px; font-weight:bold; margin-bottom:10px;">你早上一般吃什么？</div>
                <button class="btn" onclick="nextQuestion(2)">常温种猪精液</button>
                <button class="btn" onclick="nextQuestion(2)">牛奶（sperm）</button>
                <button class="btn" onclick="nextQuestion(2)">dick</button>
                <button class="btn" onclick="nextQuestion(2)">逼</button>
            </div>

            <!-- 第二题 -->
            <div id="q2" class="q-block">
                <div style="font-size:18px; font-weight:bold; margin-bottom:10px;">你周末最喜欢干什么？</div>
                <button class="btn" onclick="nextQuestion(3)">睡大觉</button>
                <button class="btn" onclick="nextQuestion(3)">打游戏</button>
                <button class="btn" onclick="nextQuestion(3)">起飞</button>
                <button class="btn" onclick="nextQuestion(3)">挖矿</button>
            </div>

            <!-- 第三题 -->
            <div id="q3" class="q-block">
                <div style="font-size:18px; font-weight:bold; margin-bottom:10px;">你晚上睡前通常干嘛？</div>
                <button class="btn" onclick="nextQuestion(4)">刷手机</button>
                <button class="btn" onclick="nextQuestion(4)">看书</button>
                <button class="btn" onclick="nextQuestion(4)">发呆</button>
                <button class="btn" onclick="nextQuestion(4)">做深蹲</button>
            </div>

            <!-- 第四题 -->
            <div id="q4" class="q-block">
                <div style="font-size:18px; font-weight:bold; margin-bottom:10px;">你暑假最想去哪？</div>
                <button class="btn" onclick="nextQuestion(5)">叙利亚</button>
                <button class="btn" onclick="nextQuestion(5)">伊拉克</button>
                <button class="btn" onclick="nextQuestion(5)">乌克兰</button>
                <button class="btn" onclick="nextQuestion(5)">十七班</button>
            </div>

            <!-- 第五题 -->
            <div id="q5" class="q-block">
                <div style="font-size:18px; font-weight:bold; margin-bottom:10px;">你最喜欢的饮料？</div>
                <button class="btn" onclick="nextQuestion(6)">常温种猪精液</button>
                <button class="btn" onclick="nextQuestion(6)">尿</button>
                <button class="btn" onclick="nextQuestion(6)">逼水</button>
                <button class="btn" onclick="nextQuestion(6)">豆汁儿</button>
            </div>

            <!-- 第六题 -->
            <div id="q6" class="q-block">
                <div style="font-size:18px; font-weight:bold; margin-bottom:10px;">你现在最想对 dickeating 说什么？</div>
                <button class="btn" onclick="nextQuestion(7)">操你妈</button>
                <button class="btn" onclick="nextQuestion(7)">滚</button>
                <button class="btn" onclick="nextQuestion(7)">你是个神</button>
                <button class="btn" onclick="nextQuestion(7)">放我出去</button>
            </div>

        </div>
    </div>

    <div class="result-box" id="resultArea">
        <div>根据 dickeating 的最新算法（dickeating ofucks 2.0)，您是：</div>
        <div class="result-text" id="finalResult">计算中...</div>
        <div class="btn-group">
            <button class="download-btn" onclick="downloadResult()">打印确诊单</button>
            <button class="reset-btn" onclick="location.reload()">重新投胎</button>
        </div>
    </div>
</div>

<script>
    let currentIndex = 1;
    let finalDiagnosis = "";
    const results = ["双性恋", "无性恋", "沃尔玛购物袋", "Gay", "Lesbian", "MtF", "FtM"];

    function nextQuestion(nextId) {
        // 隐藏当前题目
        document.getElementById('q' + currentIndex).classList.remove('active');
        if (nextId <= 6) {
            currentIndex = nextId;
            document.getElementById('q' + nextId).classList.add('active');
            document.getElementById('progressDisplay').innerText = `第 ${nextId} / 6 题`;
        } else {
            // 出结果
            showResult();
        }
    }

    function showResult() {
        document.getElementById('questionArea').style.display = 'none';
        document.getElementById('progressDisplay').style.display = 'none';
        finalDiagnosis = results[Math.floor(Math.random() * results.length)];
        document.getElementById('finalResult').innerText = finalDiagnosis;
        document.getElementById('resultArea').style.display = 'block';
    }

    function downloadResult() {
        const date = new Date().toLocaleString();
        const content = `
========================================
       dickeating ofucks 病历报告
========================================
       检测时间：${date}
       检测版本：dickeating ofucks 2.0
----------------------------------------
       最终诊断结果：${finalDiagnosis}
----------------------------------------
       医生建议：建议立刻前往“类人群星闪耀时”群聊
                进行二期确诊，并在门口排队
                领取“沃尔玛购物袋”实体化资格。
========================================
       备注：本诊断不具任何法律效力，仅供发疯使用。
       造物主：deepfuck (门高旭，王赫然，李谨然，周子轩）
       `;

        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `dickeating_病历单_${finalDiagnosis}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
                    </html>
